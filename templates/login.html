{{ define "login.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – PulsarMini</title>
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <script src="/static/js/htmx.min.js"></script>
  <style>
    body { background-color: #1a1a18; }
    .card { background: #faf9f6; border: 1px solid #e0ddd6; }
    input:focus { outline: 2px solid #c8402a; outline-offset: 0; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="card rounded-xl px-8 py-10 w-full max-w-sm shadow-lg">
    <div class="mb-8">
      <span class="inline-block w-2 h-2 rounded-full bg-accent mb-3"></span>
      <h1 class="text-2xl font-bold text-ink tracking-tight">Welcome back</h1>
      <p class="text-ink-muted text-sm mt-1">Sign in to PulsarMini</p>
    </div>
    <form method="POST" action="/login" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-ink-soft uppercase tracking-widest">Username</label>
        <input name="username" type="text" placeholder="your username"
          class="bg-paper-alt border border-rule text-ink rounded-lg px-4 py-2.5 text-sm" required>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-ink-soft uppercase tracking-widest">Password</label>
        <input name="password" type="password" placeholder="••••••••"
          class="bg-paper-alt border border-rule text-ink rounded-lg px-4 py-2.5 text-sm" required>
      </div>
      <button type="submit"
        class="mt-2 bg-accent hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
        Sign in
      </button>
    </form>
    <p class="text-center text-ink-muted text-sm mt-6">
      No account yet?
      <a href="/register" class="text-accent font-medium hover:underline">Register</a>
    </p>
  </div>
</body>
</html>
{{ end }}
